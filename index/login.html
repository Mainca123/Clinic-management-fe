<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MediPro - Đăng nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef4ff 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        :root {
            --primary: #0f6eff;
            --primary-dark: #0a5ad8;
            --primary-soft: #eef4ff;
            --primary-glow: rgba(15, 110, 255, 0.12);
            --text-main: #0f172a;
            --text-sub: #475569;
            --border-light: #e2e8f0;
            --error: #ef4444;
            --card-bg: #ffffff;
            --shadow-xl: 0 25px 45px -12px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(15, 110, 255, 0.06);
        }

        .login-wrapper {
            max-width: 1120px;
            width: 100%;
            display: flex;
            background: var(--card-bg);
            border-radius: 44px;
            overflow: hidden;
            box-shadow: var(--shadow-xl);
        }

        /* left side branding */
        .brand-side {
            flex: 1.2;
            background: linear-gradient(145deg, #0f6eff, #2b6ef0);
            padding: 48px 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 32px;
            font-weight: 800;
        }

        .logo span:first-child {
            font-size: 38px;
        }

        .logo-text {
            font-size: 28px;
            letter-spacing: -0.3px;
        }

        .hero-quote h2 {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.3;
            margin: 32px 0 16px;
        }

        .hero-quote p {
            opacity: 0.9;
            line-height: 1.5;
        }

        .feature-list {
            margin-top: 48px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .feature-list div {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .check {
            background: rgba(255,255,255,0.2);
            width: 26px;
            height: 26px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* form side */
        .form-side {
            flex: 1;
            padding: 48px 44px;
            background: white;
        }

        .form-header {
            margin-bottom: 32px;
        }

        .form-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-main);
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            width: 100%;
            padding: 14px 48px 14px 18px;
            border-radius: 28px;
            border: 1.5px solid var(--border-light);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: white;
            outline: none;
        }

        .input-group input:not([type="checkbox"]) {
            width: 100%;
            padding: 14px 18px;
            border-radius: 28px;
            border: 1.5px solid var(--border-light);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: white;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-sub);
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        .btn-login {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 44px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 16px;
            font-family: inherit;
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(15, 110, 255, 0.25);
        }

        .register-link {
            text-align: center;
            margin-top: 28px;
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .error-message {
            color: var(--error);
            font-size: 0.75rem;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        @media (max-width: 800px) {
            .login-wrapper {
                flex-direction: column;
                border-radius: 32px;
            }
            .brand-side {
                padding: 32px 28px;
            }
            .hero-quote h2 {
                font-size: 1.6rem;
            }
            .form-side {
                padding: 36px 28px;
            }
        }

        @media (max-width: 480px) {
            .form-side {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="brand-side">
        <div class="logo">
            <span>✚</span>
            <span class="logo-text">Medi<span style="font-weight:800;">Pro</span></span>
        </div>
        <div class="hero-quote">
            <h2>Chăm sóc sức khỏe thông minh hơn</h2>
            <p>Đăng nhập để quản lý lịch hẹn, hồ sơ bệnh án và kết nối với đội ngũ y tế.</p>
        </div>
        <div class="feature-list">
            <div><span class="check">✓</span> Bảo mật tuyệt đối</div>
            <div><span class="check">✓</span> Truy cập nhanh chóng</div>
            <div><span class="check">✓</span> Dữ liệu đồng bộ</div>
        </div>
    </div>

    <div class="form-side">
        <div class="form-header">
            <h1>Đăng nhập</h1>
            <p>Vui lòng nhập thông tin tài khoản của bạn</p>
        </div>

        <div class="input-group">
            <label>Tên đăng nhập / Email</label>
            <input type="text" id="loginIdentifier" placeholder="username hoặc email@example.com" autocomplete="username">
        </div>

        <div class="input-group">
            <label>Mật khẩu</label>
            <div class="password-wrapper">
                <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                <button type="button" class="toggle-password" id="toggleLoginPwd" aria-label="Hiển thị mật khẩu">👁️</button>
            </div>
            <div id="loginError" class="error-message"></div>
        </div>

        <button class="btn-login" id="doLoginBtn">Đăng nhập →</button>

        <div class="register-link">
            Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>
    </div>
</div>

<script>
    // Mô phỏng dữ liệu users (dùng localStorage để đồng bộ với register)
    let users = [];

    function loadUsers() {
        const stored = localStorage.getItem("medipro_users");
        if(stored) {
            users = JSON.parse(stored);
        } else {
            // Tạo tài khoản demo (mật khẩu đã mã hóa base64)
            users = [
                {
                    id: 1,
                    username: "admin",
                    password: btoa("admin123"),
                    full_name: "Quản trị viên",
                    email: "admin@medipro.com",
                    phone: "0987654321",
                    date_of_birth: "1990-01-01",
                    role: "ADMIN",
                    is_deleted: false,
                    deleted_at: null
                },
                {
                    id: 2,
                    username: "bacsian",
                    password: btoa("doctor123"),
                    full_name: "Lê Minh Bác",
                    email: "doctor@medipro.com",
                    phone: "0912345678",
                    date_of_birth: "1985-05-15",
                    role: "DOCTOR",
                    is_deleted: false,
                    deleted_at: null
                },
                {
                    id: 3,
                    username: "patient01",
                    password: btoa("patient123"),
                    full_name: "Trần Thị Bệnh Nhân",
                    email: "patient@example.com",
                    phone: "0903123456",
                    date_of_birth: "1995-10-20",
                    role: "PATIENT",
                    is_deleted: false,
                    deleted_at: null
                }
            ];
            localStorage.setItem("medipro_users", JSON.stringify(users));
        }
    }

    function hashPassword(pwd) {
        return btoa(pwd);
    }

    function handleLogin() {
        const identifier = document.getElementById("loginIdentifier").value.trim();
        const password = document.getElementById("loginPassword").value;
        const errorDiv = document.getElementById("loginError");

        errorDiv.innerText = "";

        if(!identifier || !password) {
            errorDiv.innerText = "Vui lòng nhập đầy đủ tên đăng nhập/email và mật khẩu";
            return;
        }

        const user = users.find(u => (u.username === identifier || u.email === identifier) && u.is_deleted === false);
        if(!user) {
            errorDiv.innerText = "Tài khoản không tồn tại hoặc đã bị vô hiệu hóa";
            return;
        }

        if(user.password !== hashPassword(password)) {
            errorDiv.innerText = "Mật khẩu không chính xác";
            return;
        }

        let roleText = "";
        if(user.role === "ADMIN") roleText = "Quản trị viên";
        else if(user.role === "DOCTOR") roleText = "Bác sĩ";
        else roleText = "Bệnh nhân";

        alert(`✅ Đăng nhập thành công!\nChào mừng ${user.full_name}`);
        // Thực tế có thể chuyển hướng: window.location.href = "dashboard.html";
        // Xóa form để trải nghiệm sạch
		if(roleText == "Bác sĩ")
			window.location.href = ("../doctor/doctor-dashboard.html");
		else if(roleText == "Bệnh nhân")
			window.location.href = ("../patient/patient-dashboard.html");
		else
			window.location.href = ("../admin/admin-dashboard.html");
        document.getElementById("loginIdentifier").value = "";
        document.getElementById("loginPassword").value = "";
    }

    // Toggle hiển thị mật khẩu
    function setupPasswordToggle(inputId, toggleBtnId) {
        const input = document.getElementById(inputId);
        const btn = document.getElementById(toggleBtnId);
        if(!input || !btn) return;
        btn.addEventListener("click", () => {
            const type = input.getAttribute("type") === "password" ? "text" : "password";
            input.setAttribute("type", type);
            btn.textContent = type === "password" ? "👁️" : "🙈";
        });
    }

    window.addEventListener("DOMContentLoaded", () => {
        loadUsers();
        setupPasswordToggle("loginPassword", "toggleLoginPwd");
        document.getElementById("doLoginBtn").addEventListener("click", handleLogin);
        // Enter key support
        const pwdField = document.getElementById("loginPassword");
        const idField = document.getElementById("loginIdentifier");
        const handleEnter = (e) => { if(e.key === "Enter") handleLogin(); };
        pwdField.addEventListener("keypress", handleEnter);
        idField.addEventListener("keypress", handleEnter);
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiến hành khám bệnh | MediPro</title>
	<link rel="stylesheet" href="../style/base.css">
	<link rel="stylesheet" href="../style/components.css">
	<link rel="stylesheet" href="../style/doctor.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">✚</span>
                <span class="logo-text">Medi<span class="text-primary">Pro</span></span>
            </div>
            <nav class="nav-menu">
                <a href="doctor-dashboard.html" class="nav-item">📊 Tổng quan</a>
                <a href="doctor-appointments.html" class="nav-item">📅 Lịch hẹn</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <button class="btn-action secondary" onclick="history.back()">← Quay lại</button>
                <div class="user-profile">
                    <span class="user-name">Đang khám: <b>Nguyễn Văn Mạnh</b></span>
                </div>
            </header>

            <div class="page-content">
                <div class="exam-grid">
                    <div class="exam-sidebar">
                        <div class="card patient-summary">
                            <img src="https://api.dicebear.com/8.x/adventurer/svg?seed=NVM" class="avatar-lg">
                            <h3>Nguyễn Văn Mạnh</h3>
                            <p>Nam - 25 tuổi</p>
                            <hr style="margin: 15px 0; opacity: 0.1;">
                            <div class="patient-note" style="text-align: left;">
                                <label style="font-weight: 600;">Lý do khám:</label>
                                <p style="color: var(--text-sub); font-size: 0.9rem;">Đau bụng dưới vùng sườn phải, buồn nôn nhẹ.</p>
                            </div>
                        </div>
                        
                        <div class="card history-card" style="margin-top: 20px;">
                            <h4 style="margin-bottom: 10px;">Lịch sử khám</h4>
                            <ul style="font-size: 0.85rem; color: var(--text-sub); line-height: 1.6;">
                                <li>• 15/03/2026: Rối loạn tiêu hóa</li>
                                <li>• 10/01/2026: Kiểm tra sức khỏe</li>
                            </ul>
                        </div>
                    </div>

                    <div class="exam-main">
                        <div class="card">
                            <h2 style="margin-bottom: 20px;">Lập Bệnh Án</h2>
                            
                            <div class="form-section" style="margin-bottom: 20px;">
                                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Chẩn đoán bệnh</label>
                                <textarea class="custom-input" rows="3" placeholder="Nhập kết luận chẩn đoán..."></textarea>
                            </div>

                            <div class="form-section" style="margin-bottom: 20px;">
                                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Kê đơn thuốc</label>
                                <div id="prescription-area">
                                    <div class="prescription-row" style="display: flex; gap: 10px; margin-bottom: 10px;">
                                        <select class="custom-select" style="flex: 2;">
                                            <option>Paracetamol 500mg</option>
                                            <option>Amoxicillin</option>
                                            <option>Berberin</option>
                                        </select>
                                        <input type="number" placeholder="SL" class="custom-input" style="flex: 0.5;">
                                        <input type="text" placeholder="Cách dùng" class="custom-input" style="flex: 2;">
                                        <button class="btn-delete" style="background:#fee2e2; border:none; border-radius:8px; width:40px; cursor:pointer;">×</button>
                                    </div>
                                </div>
                                <button class="btn-action secondary" onclick="addMedicine()" style="margin-top: 10px;">+ Thêm thuốc</button>
                            </div>

                            <div class="form-section" style="margin-bottom: 20px;">
                                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Hẹn tái khám</label>
                                <input type="date" class="custom-input" style="width: 200px;">
                            </div>

                            <div class="form-actions" style="display: flex; gap: 10px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                                <button class="btn-action secondary" style="flex: 1;">Lưu nháp</button>
                                <button class="btn-action" style="flex: 2;">Hoàn tất & Lưu bệnh án</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="doctor.js"></script>
</body>
</html>
